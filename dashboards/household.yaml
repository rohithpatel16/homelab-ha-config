# Household dashboard — git-canonical (Model B behavior layer).
# Entity ids verified against Developer Tools → States on 2026-06-14.
#
# Note: the Hue motion sensor's entities are named living_room_sensor_1_* (the
# device was added as "Kitchen motion sensor" but lives under living_room). If it
# is physically in the kitchen, rename the device in HA and update these ids.

title: Household
views:
  - title: Home
    path: home
    icon: mdi:home
    cards:
      # --- Bathroom climate (the awareness-only humidity automation) ---
      - type: gauge
        name: Bathroom humidity
        entity: sensor.0xf4b3b1fffe6bb49d_humidity
        unit: "%"
        min: 20
        max: 90
        needle: true
        severity:
          green: 0
          yellow: 60
          red: 75

      - type: entities
        title: Bathroom fan automation
        entities:
          - entity: sensor.0xf4b3b1fffe6bb49d_humidity
            name: Humidity now
          - entity: sensor.0xf4b3b1fffe6bb49d_temperature
            name: Bathroom temperature
          - entity: input_number.bathroom_humidity_baseline
            name: Learned baseline
          - entity: input_boolean.bathroom_shower_active
            name: Shower active

      - type: history-graph
        title: Bathroom humidity (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.0xf4b3b1fffe6bb49d_humidity
            name: Humidity
          - entity: input_number.bathroom_humidity_baseline
            name: Baseline

      # --- Lights (room groups first, then individual fixtures) ---
      - type: entities
        title: Lights
        entities:
          - entity: light.bedroom_bedroom
            name: Bedroom (room)
          - entity: light.dining_dining
            name: Dining (room)
          - entity: light.living_room_living_room
            name: Living room (room)
          - type: divider
          - entity: light.dining_dining_light_1
            name: Dining light 1
          - entity: light.dining_dining_light_2
            name: Dining light 2
          - entity: light.bedroom_hue_color_spot_1
            name: Bedroom spot
          - entity: light.living_room_living_room_2
            name: Living room downlight

      # --- Hue motion sensor (living_room_sensor_1) — awareness only ---
      - type: entities
        title: Living room sensor
        entities:
          - entity: binary_sensor.living_room_sensor_1_motion
            name: Motion
          - entity: sensor.living_room_sensor_1_temperature
            name: Temperature
          - entity: sensor.living_room_sensor_1_illuminance
            name: Light level

      # --- Device health ---
      - type: entities
        title: Device health
        entities:
          - entity: sensor.0xf4b3b1fffe6bb49d_battery
            name: Bathroom sensor battery
          - entity: sensor.0xf4b3b1fffe6bb49d_linkquality
            name: Bathroom sensor link
          - entity: sensor.living_room_sensor_1_battery
            name: Living room sensor battery
          - entity: sensor.living_room_sensor_1_zigbee_connectivity
            name: Living room sensor link
